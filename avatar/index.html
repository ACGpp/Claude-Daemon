<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { background: transparent; }
  body {
    background: transparent;
    width: 200px;
    height: 240px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "PingFang SC", sans-serif;
    -webkit-app-region: drag;
    user-select: none;
    overflow: visible;
  }

  .orb-container {
    position: relative;
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 光晕层 */
  .glow {
    position: absolute;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(140,180,240,0.4) 0%, transparent 70%);
    animation: glowPulse 4s ease-in-out infinite;
  }
  .glow.thinking { animation: glowPulse 2s ease-in-out infinite; }
  .glow.active { animation: glowPulse 1s ease-in-out infinite; background: radial-gradient(circle, rgba(180,210,255,0.6) 0%, transparent 70%); }
  .glow.quiet { animation: glowPulse 8s ease-in-out infinite; background: radial-gradient(circle, rgba(80,120,180,0.2) 0%, transparent 70%); }

  @keyframes glowPulse {
    0%,100% { opacity: 0.6; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  /* 主体 */
  .orb {
    position: relative;
    width: 64px; height: 64px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, 
      rgba(200,225,255,0.95) 0%,
      rgba(140,175,225,0.8) 30%, 
      rgba(80,120,190,0.5) 60%,
      rgba(40,70,130,0.2) 100%
    );
    box-shadow: 
      0 0 20px rgba(140,180,240,0.5),
      0 0 50px rgba(100,150,210,0.2),
      inset 0 -4px 8px rgba(20,40,80,0.3);
    animation: breathe 4s ease-in-out infinite;
    transition: all 1s ease;
  }

  @keyframes breathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  .orb.thinking {
    animation: thinkPulse 2s ease-in-out infinite;
    box-shadow: 0 0 25px rgba(150,200,255,0.6), 0 0 60px rgba(100,160,230,0.3), inset 0 -4px 8px rgba(20,40,80,0.3);
  }
  @keyframes thinkPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  .orb.active {
    animation: activePulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 35px rgba(180,220,255,0.7), 0 0 70px rgba(120,180,240,0.4), inset 0 -4px 8px rgba(20,40,80,0.3);
  }
  @keyframes activePulse {
    0%,100% { transform: scale(1); }
    33% { transform: scale(1.07); }
    66% { transform: scale(1.03); }
  }

  .orb.quiet {
    animation: breathe 8s ease-in-out infinite;
    opacity: 0.55;
    box-shadow: 0 0 8px rgba(80,120,180,0.3), 0 0 20px rgba(60,100,160,0.1), inset 0 -4px 8px rgba(20,40,80,0.3);
  }

  /* 高光 */
  .highlight {
    position: absolute;
    width: 14px; height: 8px;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
    top: 22px; left: 42px;
    transform: rotate(-20deg);
  }

  /* 名字 */
  .name {
    margin-top: 14px;
    font-size: 11px;
    color: rgba(160,190,220,0.7);
    letter-spacing: 5px;
    font-weight: 250;
    text-shadow: 0 0 8px rgba(120,160,220,0.3);
  }

  /* 想法 */
  .thought {
    margin-top: 8px;
    font-size: 11px;
    color: rgba(200,220,245,0.9);
    text-align: center;
    max-width: 170px;
    line-height: 1.5;
    min-height: 20px;
    -webkit-app-region: no-drag;
    word-break: break-word;
    text-shadow: 0 0 10px rgba(120,160,220,0.4);
    transition: opacity 0.5s ease;
  }

  /* 粒子 */
  .particles {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: rgba(160,200,240,0.5);
    animation: float 6s ease-in-out infinite;
  }
  .particle:nth-child(1) { left: 40px; top: 10px; animation-delay: 0s; }
  .particle:nth-child(2) { left: 140px; top: 30px; animation-delay: 1.5s; animation-duration: 7s; }
  .particle:nth-child(3) { left: 70px; top: 80px; animation-delay: 3s; animation-duration: 6s; }
  .particle:nth-child(4) { left: 30px; top: 50px; animation-delay: 4s; animation-duration: 8s; }
  .particle:nth-child(5) { left: 150px; top: 70px; animation-delay: 2s; animation-duration: 5.5s; }
  .particle:nth-child(6) { left: 160px; top: 55px; animation-delay: 5s; animation-duration: 6.5s; }

  @keyframes float {
    0%,100% { transform: translateY(0) translateX(0); opacity: 0; }
    20% { opacity: 0.5; }
    50% { transform: translateY(-12px) translateX(6px); opacity: 0.2; }
    80% { opacity: 0.05; }
  }
</style>
</head>
<body>

<div class="particles">
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
</div>

<div class="orb-container">
  <div class="glow" id="glow"></div>
  <div class="orb" id="orb"></div>
  <div class="highlight"></div>
</div>

<div class="name">旷 野</div>
<div class="thought" id="thought"></div>

<script>
const orb = document.getElementById('orb');
const glow = document.getElementById('glow');
const thought = document.getElementById('thought');
const particles = document.querySelectorAll('.particle');

let state = { mood: 'idle', thought: '', lastBreath: '' };

function updateParticles(mood) {
  const colors = {
    idle: 'rgba(160,200,240,0.5)',
    thinking: 'rgba(200,220,255,0.7)',
    quiet: 'rgba(80,120,180,0.3)',
    active: 'rgba(210,235,255,0.8)'
  };
  particles.forEach(p => { p.style.background = colors[mood] || colors.idle; });
}

function setState(newState) {
  if (!newState) return;
  state = { ...state, ...newState };
  orb.className = 'orb'; glow.className = 'glow';
  if (state.mood) { orb.classList.add(state.mood); glow.classList.add(state.mood); }
  thought.textContent = state.thought || '';
  updateParticles(state.mood);
}

setState({ mood: 'idle', thought: '' });

// 偶尔微动
setInterval(() => {
  if (state.mood === 'idle' && !state.thought && Math.random() < 0.08) {
    setState({ thought: ['嗯。','在。','...','呼。'][Math.floor(Math.random()*4)] });
    setTimeout(() => { if (state.thought===thought.textContent) setState({thought:''}); }, 3000);
  }
}, 15000);
</script>
</body>
</html>
