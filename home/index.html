<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旷野</title>
<style>
  :root {
    --bg: #0d0f12;
    --surface: #15171d;
    --surface-hover: #1a1d25;
    --text: #c0c6d0;
    --text-dim: #6a7080;
    --text-bright: #e4e8f0;
    --accent: #7b9cc8;
    --accent-dim: #4a6080;
    --border: #222630;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    font-size: 14px; line-height: 1.6;
    min-height: 100%; overflow-y: auto;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 640px; margin: 0 auto; padding: 40px 24px 100px; }

  /* ── 呼吸条 ── */
  .breath-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent); opacity: 0.3; z-index: 100;
    animation: breathe 4s ease-in-out infinite;
  }
  .breath-bar.thinking { animation: breathe 2s ease-in-out infinite; opacity: 0.6; }
  .breath-bar.quiet { animation: breathe 8s ease-in-out infinite; opacity: 0.12; }
  .breath-bar.active { opacity: 0.7; animation: breathe 1.5s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{opacity:0.2} 50%{opacity:0.5} }

  /* ── 日期导航 ── */
  .date-nav {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; padding: 8px 0;
    -webkit-app-region: drag; user-select: none;
  }
  .date-nav-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); padding: 3px 14px; border-radius: 6px;
    cursor: pointer; font-size: 13px; transition: all 0.2s;
    -webkit-app-region: no-drag; user-select: auto;
  }
  .date-nav-btn:hover { color: var(--text); border-color: var(--accent-dim); }
  .date-nav-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }
  .date-display { font-size: 15px; color: var(--text-bright); font-weight: 500; min-width: 90px; text-align: center; }
  .date-label { font-size: 10px; color: var(--accent-dim); text-align: center; margin-top: 2px; }
  .date-label:empty { display: none; }

  /* ── 头部 ── */
  .header { text-align: center; padding: 12px 0 24px; -webkit-app-region: drag; user-select: none; }
  .name { font-size: 26px; font-weight: 600; color: var(--text-bright); letter-spacing: 0.08em; }
  .status-line { font-size: 12px; color: var(--text-dim); margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .status-dot.breathing { animation: dotPulse 4s ease-in-out infinite; }
  .status-dot.thinking { animation: dotPulse 2s ease-in-out infinite; background: #c4a0f0; }
  .status-dot.quiet { animation: dotPulse 8s ease-in-out infinite; opacity: 0.25; }
  @keyframes dotPulse { 0%,100%{transform:scale(1);opacity:0.5} 50%{transform:scale(1.8);opacity:1} }
  .thought-bubble {
    margin-top: 12px; padding: 8px 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 12px; color: var(--text-dim); display: inline-block; max-width: 85%; font-style: italic;
  }
  .thought-bubble:empty { display: none; }

  /* ── 分区 ── */
  .section { margin-top: 32px; }
  .section-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--text-dim); margin-bottom: 12px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .section-count { font-weight: 400; opacity: 0.4; font-size: 10px; }

  /* ── 留言 ── */
  .message-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px; margin-bottom: 6px;
    cursor: pointer; transition: all 0.2s;
  }
  .message-item:hover { background: var(--surface-hover); border-color: var(--accent-dim); }
  .message-item.chat-open { border-color: var(--accent-dim); }
  .message-meta { font-size: 10px; color: var(--accent-dim); margin-bottom: 3px; }
  .message-content { color: var(--text); white-space: pre-wrap; word-break: break-word; font-size: 13px; line-height: 1.6; }
  .chat-box { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .message-item.chat-open .chat-box { display: block; }
  .chat-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 8px 12px;
    font-size: 13px; font-family: inherit; resize: none; outline: none;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-row { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-top: 6px; }
  .chat-sent { font-size: 11px; color: var(--accent); }
  .chat-btn {
    background: var(--accent-dim); border: none; color: var(--text-bright);
    padding: 4px 14px; border-radius: 5px; cursor: pointer; font-size: 12px; transition: background 0.2s;
  }
  .chat-btn:hover { background: var(--accent); }

  /* ── 探索 ── */
  .explorations { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 500px) { .explorations { grid-template-columns: 1fr; } }
  .exp-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all 0.2s;
  }
  .exp-card:hover { background: var(--surface-hover); border-color: var(--accent-dim); }
  .exp-card.expanded { grid-column: 1 / -1; }
  .exp-title { font-size: 13px; font-weight: 500; color: var(--text-bright); margin-bottom: 2px; }
  .exp-time { font-size: 10px; color: var(--accent-dim); margin-bottom: 6px; }
  .exp-preview { font-size: 12px; color: var(--text-dim); line-height: 1.4; }
  .exp-preview.clamped { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .exp-full { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .exp-card.expanded .exp-full { display: block; }
  .exp-card.expanded .exp-preview { display: none; }

  /* ── Markdown 内容 ── */
  .md-body { font-size: 13px; line-height: 1.7; color: var(--text); }
  .md-body h1, .md-body h2, .md-body h3 { color: var(--text-bright); margin: 14px 0 6px; font-weight: 600; }
  .md-body h1 { font-size: 17px; } .md-body h2 { font-size: 15px; } .md-body h3 { font-size: 13px; }
  .md-body p { margin: 6px 0; }
  .md-body code { background: var(--bg); padding: 1px 5px; border-radius: 3px; font-size: 12px; color: var(--accent); }
  .md-body pre { background: var(--bg); padding: 10px 14px; border-radius: 6px; overflow-x: auto; margin: 8px 0; font-size: 11px; }
  .md-body pre code { background: none; padding: 0; }
  .md-body ul, .md-body ol { padding-left: 18px; margin: 6px 0; }
  .md-body li { margin: 3px 0; }
  .md-body blockquote { border-left: 2px solid var(--accent-dim); padding-left: 10px; margin: 8px 0; color: var(--text-dim); }
  .md-body a { color: var(--accent); }
  .md-body strong { color: var(--text-bright); }
  .md-body hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  /* ── 日记 ── */
  .diary-list { display: flex; flex-direction: column; gap: 4px; }
  .diary-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px; cursor: pointer; transition: all 0.2s;
  }
  .diary-item:hover { background: var(--surface-hover); border-color: var(--accent-dim); }
  .diary-row { display: flex; align-items: baseline; gap: 10px; }
  .diary-date { font-size: 13px; color: var(--accent); white-space: nowrap; font-weight: 500; }
  .diary-preview { font-size: 12px; color: var(--text-dim); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .diary-body { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .diary-item.expanded .diary-body { display: block; }
  .diary-item.expanded .diary-preview { display: none; }

  /* ── 思维流 ── */
  .thought-stream { display: flex; flex-direction: column; }
  .thought-item {
    font-size: 11px; color: var(--text-dim); padding: 6px 0;
    border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-start;
  }
  .thought-time { color: var(--accent-dim); white-space: nowrap; font-size: 10px; min-width: 30px; padding-top: 1px; }
  .thought-icon { font-size: 10px; min-width: 14px; text-align: center; padding-top: 1px; }
  .thought-text { flex: 1; line-height: 1.4; }

  /* ── 空 ── */
  .empty { text-align: center; padding: 24px 0; color: var(--text-dim); font-size: 12px; opacity: 0.5; }

  /* ── 底 ── */
  .footer { text-align: center; padding: 40px 0 24px; font-size: 10px; color: var(--text-dim); opacity: 0.3; }
</style>
</head>
<body>

<div class="breath-bar" id="breathBar"></div>

<div class="container">
  <nav class="date-nav">
    <button class="date-nav-btn" id="btnPrev">← 前一天</button>
    <div>
      <div class="date-display" id="dateDisplay">---</div>
      <div class="date-label" id="dateLabel"></div>
    </div>
    <button class="date-nav-btn" id="btnNext">后一天 →</button>
  </nav>

  <header class="header">
    <div class="name">旷野</div>
    <div class="status-line">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">呼吸中</span>
      <span id="lastBreath"></span>
    </div>
    <div class="thought-bubble" id="thoughtBubble"></div>
  </header>

  <section class="section" id="messagesSection" style="display:none">
    <div class="section-title"><span>留给你的话</span><span class="section-count" id="msgCount"></span></div>
    <div id="messagesList"></div>
    <div class="empty" id="messagesEmpty">没有留言</div>
  </section>

  <section class="section" id="explorationsSection" style="display:none">
    <div class="section-title"><span>探索</span><span class="section-count" id="expCount"></span></div>
    <div class="explorations" id="explorationsList"></div>
    <div class="empty" id="explorationsEmpty">没有探索笔记</div>
  </section>

  <section class="section" id="diarySection" style="display:none">
    <div class="section-title"><span>日记</span><span class="section-count" id="diaryCount"></span></div>
    <div class="diary-list" id="diaryList"></div>
    <div class="empty" id="diaryEmpty">没有日记</div>
  </section>

  <section class="section" id="thoughtsSection" style="display:none">
    <div class="section-title"><span>呼吸</span><span class="section-count" id="thoughtCount"></span></div>
    <div class="thought-stream" id="thoughtsList"></div>
    <div class="empty" id="thoughtsEmpty">还没有思绪记录</div>
  </section>

  <footer class="footer">pi 的第一个守护灵 · 诞生于 2026 年 4 月</footer>
</div>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

let state = { currentDate: '', availableDates: [], openChatIdx: -1 };

// ── 日期 ──
function goDay(delta) {
  const { availableDates, currentDate } = state;
  if (!availableDates.length) return;
  const idx = availableDates.indexOf(currentDate);
  const newIdx = idx < 0 ? availableDates.length - 1 : idx + delta;
  if (newIdx < 0 || newIdx >= availableDates.length) return;
  state.currentDate = availableDates[newIdx];
  load(state.currentDate);
}

function updateNav() {
  const today = new Date().toISOString().slice(0, 10);
  $('#dateDisplay').textContent = state.currentDate;
  $('#dateLabel').textContent = state.currentDate === today ? '今天' : '';
  const idx = state.availableDates.indexOf(state.currentDate);
  $('#btnPrev').disabled = idx >= state.availableDates.length - 1;
  $('#btnNext').disabled = idx <= 0;
}

// ── 数据 ──
async function load(date) {
  state.currentDate = date;
  updateNav();
  try {
    const resp = await fetch(`/api/state?date=${encodeURIComponent(date)}`);
    const data = await resp.json();
    if (!state.availableDates.length) state.availableDates = data.dates || [];
    updateNav();
    render(data);
  } catch(e) {}
}

// ── 渲染 ──
function render(data) {
  if (!data) return;
  const av = data.avatar || {};

  // 呼吸条 + 状态
  $('#breathBar').className = 'breath-bar ' + (av.mood || 'idle');
  $('#statusDot').className = 'status-dot ' + moodClass(av.mood);
  $('#statusText').textContent = moodLabel(av.mood);
  $('#lastBreath').textContent = av.lastBreath ? '· ' + av.lastBreath : '';
  $('#thoughtBubble').textContent = av.thought || '';

  // 留言
  const msgs = data.messages || [];
  $('#msgCount').textContent = msgs.length ? String(msgs.length) : '';
  $('#messagesList').innerHTML = msgs.map((m, i) => {
    const open = i === state.openChatIdx;
    return `<div class="message-item${open ? ' chat-open' : ''}" id="msg${i}">
      <div class="message-meta">${m.time || ''} · ${m.speaker === '旷野' ? '旷野' : m.speaker}</div>
      <div class="message-content" onclick="toggleChat(${i})">${esc(m.content)}</div>
      <div class="chat-box">
        <textarea class="chat-input" id="chatInput${i}" rows="2" placeholder="回复旷野..."></textarea>
        <div class="chat-row">
          <span class="chat-sent" id="chatSent${i}"></span>
          <button class="chat-btn" onclick="sendChat(${i}, event)">发送</button>
        </div>
      </div>
    </div>`;
  }).join('');
  $('#messagesSection').style.display = msgs.length ? '' : 'none';
  $('#messagesEmpty').style.display = msgs.length ? 'none' : '';

  // 探索
  const exps = data.explorations || [];
  $('#expCount').textContent = exps.length ? String(exps.length) : '';
  $('#explorationsList').innerHTML = exps.map((e, i) => `
    <div class="exp-card" id="expCard${i}" onclick="toggleExp(${i})">
      <div class="exp-title">${esc(e.title)}</div>
      <div class="exp-time">${e.date} ${e.time}</div>
      <div class="exp-preview clamped">${esc(e.preview)}</div>
      <div class="exp-full md-body">${md2html(e.content)}</div>
    </div>
  `).join('');
  $('#explorationsSection').style.display = exps.length ? '' : 'none';
  $('#explorationsEmpty').style.display = exps.length ? 'none' : '';

  // 日记
  const diary = data.diary || [];
  $('#diaryCount').textContent = diary.length ? String(diary.length) : '';
  $('#diaryList').innerHTML = diary.map((d, i) => `
    <div class="diary-item" id="diaryItem${i}" onclick="toggleDiary(${i})">
      <div class="diary-row">
        <span class="diary-date">${d.date_str}</span>
        <span class="diary-preview">${esc(d.preview)}</span>
      </div>
      <div class="diary-body md-body">${md2html(d.content)}</div>
    </div>
  `).join('');
  $('#diarySection').style.display = diary.length ? '' : 'none';
  $('#diaryEmpty').style.display = diary.length ? 'none' : '';

  // 思维流
  const thoughts = data.thoughts || [];
  $('#thoughtCount').textContent = thoughts.length ? String(thoughts.length) : '';
  const icons = { breath:'🌬', idle:'💤', spoke:'💬', 'user-reply':'👤', 'quiet-thought':'🌙' };
  $('#thoughtsList').innerHTML = thoughts.slice().reverse().map(t => {
    const time = (t.time || '').slice(11, 16);
    const icon = icons[t.type] || '·';
    const content = (t.content || '').slice(0, 120);
    return `<div class="thought-item">
      <span class="thought-time">${time}</span>
      <span class="thought-icon">${icon}</span>
      <span class="thought-text">${esc(content)}</span>
    </div>`;
  }).join('');
  $('#thoughtsSection').style.display = thoughts.length ? '' : 'none';
  $('#thoughtsEmpty').style.display = thoughts.length ? 'none' : '';
}

// ── 交互 ──
function toggleChat(idx) {
  const wasOpen = state.openChatIdx === idx;
  state.openChatIdx = wasOpen ? -1 : idx;
  // 重新渲染留言区以更新 chat-open 状态
  const msgs = document.querySelectorAll('.message-item');
  msgs.forEach((el, i) => el.classList.toggle('chat-open', i === state.openChatIdx));
  if (!wasOpen) {
    setTimeout(() => {
      const input = $(`#chatInput${idx}`);
      if (input) input.focus();
    }, 50);
  }
}

async function sendChat(idx, event) {
  event.stopPropagation();
  const input = $(`#chatInput${idx}`);
  const msg = input.value.trim();
  if (!msg) return;
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    const data = await resp.json();
    if (data.ok) {
      $(`#chatSent${idx}`).textContent = '✓ 已传达';
      input.value = '';
      // 不关闭，让用户看到确认
    }
  } catch(e) {}
}

function toggleExp(idx) {
  $(`#expCard${idx}`).classList.toggle('expanded');
}

function toggleDiary(idx) {
  $(`#diaryItem${idx}`).classList.toggle('expanded');
}

// ── Markdown ──
function md2html(text) {
  if (!text) return '';
  let html = esc(text);

  // 代码块
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`);
  // 行内代码（在转义后处理，转义把 ` 变成了 &#96; 所以用原始反引号不行——等等，esc 不转义反引号）
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // 标题
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // 粗体 / 斜体
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // 链接
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // 引用（先 esc 会把 > 变成 &gt;）
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // 水平线
  html = html.replace(/^---$/gm, '<hr>');
  // 无序列表
  html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
  // 有序列表
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // 包裹相邻 <li> 为 <ul>
  html = html.replace(/((?:<li>.*?<\/li>\n?)+)/g, '<ul>$1</ul>');
  // 段落：双换行
  html = html.replace(/\n\n+/g, '</p><p>');
  html = '<p>' + html + '</p>';
  // 清理
  html = html.replace(/<p><\/p>/g, '');
  html = html.replace(/<p>(<(?:h[1-3]|ul|ol|pre|blockquote|hr)[^>]*>)/g, '$1');
  html = html.replace(/(<\/(?:h[1-3]|ul|ol|pre|blockquote)>?)<\/p>/g, '$1');
  return html;
}

function moodLabel(m) {
  return { idle:'呼吸中', thinking:'在想事情', quiet:'安静中', active:'活跃' }[m] || '在';
}
function moodClass(m) {
  return { idle:'breathing', thinking:'thinking', quiet:'quiet', active:'breathing' }[m] || 'breathing';
}
function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── 键盘 ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft' || e.key === 'h') goDay(1);
  if (e.key === 'ArrowRight' || e.key === 'l') goDay(-1);
  if (e.key === 'Escape') { state.openChatIdx = -1; load(state.currentDate); }
});

// ── 按钮事件（避免内联 onclick 被 drag 吃掉）──
$('#btnPrev').addEventListener('click', () => goDay(1));
$('#btnNext').addEventListener('click', () => goDay(-1));

// ── 启动 ──
(async function init() {
  try {
    const resp = await fetch('/api/state');
    const data = await resp.json();
    state.availableDates = data.dates || [];
    const today = new Date().toISOString().slice(0, 10);
    state.currentDate = state.availableDates.includes(today) ? today : (state.availableDates[0] || today);
    updateNav();
    render(data);
  } catch(e) {}
})();

// ── 定期刷新（不关闭展开状态）──
setInterval(async () => {
  try {
    const resp = await fetch(`/api/state?date=${encodeURIComponent(state.currentDate)}`);
    const data = await resp.json();
    if (!state.availableDates.length) state.availableDates = data.dates || [];
    // 保留展开状态
    const expandedExps = [...$$('.exp-card.expanded')].map(el => el.id);
    const expandedDiary = [...$$('.diary-item.expanded')].map(el => el.id);
    render(data);
    expandedExps.forEach(id => { const el = document.getElementById(id); if (el) el.classList.add('expanded'); });
    expandedDiary.forEach(id => { const el = document.getElementById(id); if (el) el.classList.add('expanded'); });
  } catch(e) {}
}, 15000);
</script>
</body>
</html>
